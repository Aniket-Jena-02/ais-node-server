name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "server/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev

      - run: |
          docker build \
          -t asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ether/server:${{ github.sha }} .

      - run: |
          docker push \
          asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ether/server:${{ github.sha }}

      - run: |
          gcloud run deploy ether-server \
            --image asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ether/server:${{ github.sha }} \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated
